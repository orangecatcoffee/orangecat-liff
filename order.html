<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เมนู - กาแฟแมวส้ม</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #FFF8F0;
    color: #4A3428;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Banner */
  .banner {
    background: linear-gradient(135deg, #FFF3E8 0%, #FFE4CC 100%);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
    text-align: center;
  }
  .banner .brand {
    font-size: 13px;
    color: #A8876F;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .banner .cat-placeholder {
    font-size: 56px;
    margin-bottom: 8px;
  }
  .banner h1 {
    font-size: 26px;
    color: #4A3428;
    margin-bottom: 4px;
  }
  .banner h1 span { color: #E8863A; }
  .banner p {
    font-size: 13px;
    color: #8a6a4a;
  }

  /* Step indicator */
  .steps {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .step { display: flex; align-items: center; gap: 8px; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: #E8863A; color: #fff; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step.inactive .step-num { background: #E0D2C2; }
  .step-label { font-size: 13px; }
  .step-label b { display: block; font-size: 12px; color: #4A3428; }
  .step-label span { font-size: 11px; color: #A8876F; }

  /* Layout: menu + sidebar */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
  }
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
  }

  .group {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .group h2 {
    font-size: 15px;
    color: #E8863A;
    margin-bottom: 14px;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 480px) and (max-width: 720px) {
    .menu-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .menu-card {
    border: 2px solid #F0E4D8;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .menu-card.selected {
    border-color: #E8863A;
    background: #FFF3E8;
  }
  .menu-card .icon {
    font-size: 30px;
    margin-bottom: 6px;
  }
  .cup-icon {
    width: 56px;
    height: 84px;
    object-fit: cover;
    border-radius: 8px;
  }
  .selected-item .cup-icon {
    width: 28px;
    height: 42px;
    border-radius: 5px;
    vertical-align: middle;
    margin-right: 4px;
  }
  .menu-card .name {
    font-size: 12.5px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    min-height: 32px;
  }
  .menu-card .price {
    font-size: 12px;
    color: #E8863A;
    font-weight: 700;
  }

  /* Sidebar */
  .sidebar {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    align-self: start;
    position: sticky;
    top: 20px;
  }
  .sidebar h2 { font-size: 15px; color: #E8863A; margin-bottom: 12px; }
  .selected-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #FFF3E8;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .selected-item .empty { color: #A8876F; }
  .qty-control {
    display: flex; align-items: center; gap: 10px;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid #E8863A; background: #fff; color: #E8863A;
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  label.field-label {
    font-size: 12px; color: #8a6a4a; margin-bottom: 6px; display: block;
  }
  textarea, input {
    width: 100%;
    border: 2px solid #F0E4D8;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    margin-bottom: 14px;
  }
  textarea:focus, input:focus { outline: none; border-color: #E8863A; }
  .total-row {
    display: flex; justify-content: space-between;
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
    padding-top: 10px; border-top: 1px solid #F0E4D8;
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: #E8863A;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:disabled { background: #D8C4B0; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .status-msg { text-align: center; margin-top: 12px; font-size: 13px; min-height: 18px; }
  .status-msg.error { color: #D64545; }
  .status-msg.success { color: #4A9B5C; }
  .loading { text-align: center; color: #A8876F; font-size: 13px; padding: 20px; }
</style>
</head>
<body>

<div class="wrap">

  <div class="banner">
    <div class="brand">กาแฟแมวส้ม · COFFEE</div>
    <div class="cat-placeholder">🐱☕</div>
    <h1>MEET <span>ORANGE.</span></h1>
    <p>แมวส้มพร้อมแล้วที่จะเสิร์ฟความสดชื่นในทุกเช้าวันอาทิตย์ 🧡</p>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-label"><b>เลือกเมนู</b><span>เลือกเครื่องดื่มที่ชอบ</span></div>
    </div>
    <div class="step inactive">
      <div class="step-num">2</div>
      <div class="step-label"><b>เพิ่มหมายเหตุ</b><span>บอกความต้องการของคุณ</span></div>
    </div>
    <div class="step inactive">
      <div class="step-num">3</div>
      <div class="step-label"><b>ยืนยันออเดอร์</b><span>เสร็จแล้ว รอรับได้เลย!</span></div>
    </div>
  </div>

  <div class="layout">
    <div class="menu-col">
      <div class="group">
        <h2>☕ กลุ่มกาแฟ</h2>
        <div class="menu-grid" id="coffeeGrid"></div>
      </div>
      <div class="group">
        <h2>🍵 กลุ่มชาเขียว</h2>
        <div class="menu-grid" id="matchaGrid"></div>
      </div>
    </div>

    <div class="sidebar">
      <h2>รายการของคุณ</h2>
      <div class="selected-item" id="selectedItemBox">
        <span class="empty">ยังไม่ได้เลือกเมนู</span>
      </div>

      <label class="field-label">หมายเหตุ (ไม่บังคับ)</label>
      <textarea id="notes" rows="3" maxlength="100" placeholder="เช่น แข้งอะไร / ขอเล็กน้อย ฯลฯ"></textarea>

      <label class="field-label">ที่อยู่ / จุดรับ</label>
      <textarea id="address" rows="2" placeholder="เช่น ชื่อตึก/ชั้น/แผนก หรือที่อยู่บ้าน"></textarea>

      <div class="total-row">
        <span>รวมทั้งหมด</span>
        <span id="totalPrice">0 บาท</span>
      </div>

      <button class="btn" id="submitBtn" disabled>เลือกเมนูก่อนนะครับ</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

</div>

  function iconFor(name) {
    if (CUP_IMAGES[name]) return `<img src="${CUP_IMAGES[name]}" alt="${name}" class="cup-icon">`;
    // fallback เผื่อชื่อเมนูไม่ตรงกับที่มีรูป (เช่น เพิ่มเมนูใหม่ในอนาคต)
    if (name.toLowerCase().includes('matcha')) return '🍵';
    return '☕';
  }

  async function loadMenu() {
    const { data, error } = await sb
      .from('menu_items')
      .select('*')
      .order('id', { ascending: true });

    const coffeeGrid = document.getElementById('coffeeGrid');
    const matchaGrid = document.getElementById('matchaGrid');

    if (error) {
      coffeeGrid.innerHTML = `<div class="status-msg error">โหลดเมนูไม่สำเร็จ: ${error.message}</div>`;
      return;
    }
    if (!data || data.length === 0) {
      coffeeGrid.innerHTML = `<div class="status-msg error">ไม่พบเมนูใน menu_items</div>`;
      return;
    }

    coffeeGrid.innerHTML = '';
    matchaGrid.innerHTML = '';

    data.forEach(item => {
      const isMatcha = item.name.toLowerCase().includes('matcha') || item.name.includes('มัทฉะ') || item.name.includes('ชาเขียว');
      const div = document.createElement('div');
      div.className = 'menu-card';
      div.dataset.id = item.id;
      div.innerHTML = `
        <div class="icon">${iconFor(item.name)}</div>
        <div class="name">${item.name}</div>
        <div class="price">${item.price} บาท</div>
      `;
      div.addEventListener('click', () => selectItem(item, div));
      (isMatcha ? matchaGrid : coffeeGrid).appendChild(div);
    });
  }

  function selectItem(item, el) {
    document.querySelectorAll('.menu-card').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedItem = item;
    quantity = 1;
    renderSelected();
  }

  function renderSelected() {
    const box = document.getElementById('selectedItemBox');
    if (!selectedItem) {
      box.innerHTML = `<span class="empty">ยังไม่ได้เลือกเมนู</span>`;
      document.getElementById('totalPrice').textContent = '0 บาท';
      updateSubmitBtn();
      return;
    }
    box.innerHTML = `
      <span>${iconFor(selectedItem.name)} ${selectedItem.name}</span>
      <div class="qty-control">
        <button class="qty-btn" id="qtyMinus" type="button">−</button>
        <span id="qtyVal">${quantity}</span>
        <button class="qty-btn" id="qtyPlus" type="button">+</button>
      </div>
    `;
    document.getElementById('qtyMinus').addEventListener('click', () => changeQty(-1));
    document.getElementById('qtyPlus').addEventListener('click', () => changeQty(1));
    updateTotal();
    updateSubmitBtn();
  }

  function changeQty(delta) {
    quantity = Math.max(1, quantity + delta);
    document.getElementById('qtyVal').textContent = quantity;
    updateTotal();
    updateSubmitBtn();
  }

  function updateTotal() {
    const total = selectedItem ? selectedItem.price * quantity : 0;
    document.getElementById('totalPrice').textContent = `${total} บาท`;
  }

  function updateSubmitBtn() {
    const btn = document.getElementById('submitBtn');
    const addr = document.getElementById('address').value.trim();
    if (!selectedItem) {
      btn.disabled = true;
      btn.textContent = 'เลือกเมนูก่อนนะครับ';
    } else if (!addr) {
      btn.disabled = true;
      btn.textContent = 'กรอกที่อยู่/จุดรับก่อนนะครับ';
    } else {
      btn.disabled = false;
      btn.textContent = `ยืนยันการสั่งซื้อ · ${selectedItem.price * quantity} บาท`;
    }
  }

  document.getElementById('address').addEventListener('input', updateSubmitBtn);

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('statusMsg');
    const addr = document.getElementById('address').value.trim();
    const notes = document.getElementById('notes').value.trim();

    if (!selectedItem || !addr) return;

    btn.disabled = true;
    btn.textContent = 'กำลังบันทึกออเดอร์...';
    statusEl.textContent = '';
    statusEl.className = 'status-msg';

    const totalPrice = selectedItem.price * quantity;

    const { error } = await sb
      .from('transactions')
      .insert([{
        member_id: memberId,
        menu_item_id: selectedItem.id,
        quantity: quantity,
        total_price: totalPrice,
        channel: 'liff-order',
        address: notes ? `${addr} (หมายเหตุ: ${notes})` : addr,
        status: 'pending'
      }]);

    if (error) {
      statusEl.textContent = `บันทึกไม่สำเร็จ: ${error.message}`;
      statusEl.className = 'status-msg error';
      btn.disabled = false;
      updateSubmitBtn();
      return;
    }

    statusEl.textContent = '✅ สั่งซื้อสำเร็จ! รอแอดมินยืนยันออเดอร์ครับ';
    statusEl.className = 'status-msg success';
    btn.textContent = 'สั่งซื้อแล้ว';
  });

  loadMenu();
</script>
