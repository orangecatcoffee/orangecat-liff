<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ชำระเงิน - กาแฟแมวส้ม</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #FFF8F0;
    color: #4A3428;
    min-height: 100vh;
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 20px; }

  .banner {
    background: linear-gradient(135deg, #FFF3E8 0%, #FFE4CC 100%);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
    text-align: center;
  }
  .banner .brand { font-size: 13px; color: #A8876F; letter-spacing: 1px; margin-bottom: 6px; }
  .banner .icon { font-size: 48px; margin-bottom: 8px; }
  .banner h1 { font-size: 24px; color: #4A3428; margin-bottom: 4px; }
  .banner h1 span { color: #E8863A; }
  .banner p { font-size: 13px; color: #8a6a4a; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    text-align: center;
  }
  .qr-frame {
    background: #fff;
    border: 3px solid #FFE4CC;
    border-radius: 16px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 16px;
  }
  #qrcode { display: flex; align-items: center; justify-content: center; }
  #qrcode img { image-rendering: pixelated; }

  .amount-display {
    font-size: 26px;
    font-weight: 700;
    color: #E8863A;
    margin-bottom: 4px;
  }
  .amount-label { font-size: 12px; color: #8a6a4a; margin-bottom: 16px; }

  .shop-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .shop-number { font-size: 13px; color: #8a6a4a; margin-bottom: 18px; }

  .hint {
    background: #FFF3E8;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12.5px;
    color: #8a6a4a;
    line-height: 1.6;
    text-align: left;
  }
  .hint b { color: #4A3428; }

  .amount-input-row {
    margin-bottom: 18px;
  }
  .amount-input-row label {
    font-size: 12px; color: #8a6a4a; margin-bottom: 6px; display: block; text-align: left;
  }
  .amount-input-wrap {
    display: flex; gap: 8px;
  }
  .amount-input-wrap input {
    flex: 1;
    border: 2px solid #F0E4D8;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    text-align: right;
    font-weight: 700;
    color: #4A3428;
  }
  .amount-input-wrap input:focus { outline: none; border-color: #E8863A; }
  .amount-input-wrap button {
    background: #E8863A; color: #fff; border: none; border-radius: 10px;
    padding: 0 18px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .amount-input-wrap button:active { transform: scale(0.97); }
  .no-amount-link {
    display: inline-block; margin-top: 8px; font-size: 11.5px; color: #A8876F;
    text-decoration: underline; background: none; border: none; cursor: pointer; font-family: inherit;
  }

  .loading { text-align: center; color: #A8876F; font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner">
    <div class="brand">กาแฟแมวส้ม · PAYMENT</div>
    <div class="icon">🐱💳</div>
    <h1>ชำระเงิน<span>ผ่าน QR</span></h1>
    <p>สแกนจ่ายด้วย PromptPay จบในสแกนเดียว</p>
  </div>

  <div class="card">
    <div class="amount-input-row">
      <label for="amountInput">ใส่ยอดเงินที่ต้องการจ่าย (บาท)</label>
      <div class="amount-input-wrap">
        <input type="number" id="amountInput" inputmode="decimal" placeholder="เช่น 75" min="0" step="0.01">
        <button id="generateBtn">สร้าง QR</button>
      </div>
      <button class="no-amount-link" id="noAmountBtn">ไม่ระบุยอด (ใส่เองตอนสแกน)</button>
    </div>

    <div class="qr-frame">
      <div id="qrcode"><div class="loading">กำลังสร้าง QR...</div></div>
    </div>
    <div id="amountBlock" style="display:none;">
      <div class="amount-display" id="amountDisplay"></div>
      <div class="amount-label">ยอดที่ต้องชำระ</div>
    </div>
    <div class="shop-name">กาแฟแมวส้ม</div>
    <div class="shop-number">PromptPay: 097 134 4100</div>

    <div class="hint">
      🐾 <b>วิธีจ่าย:</b> ใส่ยอดเงินแล้วกด "สร้าง QR" (หรือข้ามได้ถ้าจะใส่ยอดเองตอนสแกน) → เปิดแอปธนาคาร → สแกน QR นี้ → ยืนยันการโอน แล้วแจ้งพนักงานหน้าร้านได้เลยค่ะ
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const PROMPTPAY_NUMBER = "0971344100";

  function crc16(str) {
    let crc = 0xFFFF;
    for (let i = 0; i < str.length; i++) {
      crc ^= (str.charCodeAt(i) << 8);
      for (let b = 0; b < 8; b++) {
        if (crc & 0x8000) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
        else crc = (crc << 1) & 0xFFFF;
      }
    }
    return crc.toString(16).toUpperCase().padStart(4, '0');
  }

  function field(id, value) {
    return id + String(value.length).padStart(2, '0') + value;
  }

  function formatMobile(phone) {
    let digits = phone.replace(/\D/g, '');
    if (digits.startsWith('0')) digits = '66' + digits.substring(1);
    return digits.padStart(13, '0');
  }

  function buildPromptPayPayload(mobile, amount) {
    const isDynamic = !!amount;
    const f00 = field('00', '01');
    const f01 = field('01', isDynamic ? '12' : '11');

    const merchantMobile = formatMobile(mobile);
    const sub00 = field('00', 'A000000677010111');
    const sub01 = field('01', merchantMobile);
    const f29 = field('29', sub00 + sub01);

    const f53 = field('53', '764');
    const f54 = isDynamic ? field('54', Number(amount).toFixed(2)) : '';
    const f58 = field('58', 'TH');

    const withoutCrc = f00 + f01 + f29 + f53 + f54 + f58 + '6304';
    const crc = crc16(withoutCrc);
    return withoutCrc + crc;
  }

  const params = new URLSearchParams(window.location.search);
  const initialAmount = params.get('amount');

  const qrDiv = document.getElementById('qrcode');
  const amountInput = document.getElementById('amountInput');
  const amountBlock = document.getElementById('amountBlock');
  const amountDisplay = document.getElementById('amountDisplay');

  function renderQR(amount) {
    qrDiv.innerHTML = '';
    const payload = buildPromptPayPayload(PROMPTPAY_NUMBER, amount);
    new QRCode(qrDiv, {
      text: payload,
      width: 220,
      height: 220,
      colorDark: "#4A3428",
      colorLight: "#ffffff"
    });

    if (amount) {
      amountBlock.style.display = 'block';
      amountDisplay.textContent = Number(amount).toLocaleString('th-TH', {minimumFractionDigits: 2}) + ' บาท';
    } else {
      amountBlock.style.display = 'none';
    }
  }

  document.getElementById('generateBtn').addEventListener('click', () => {
    const val = parseFloat(amountInput.value);
    if (!val || val <= 0) {
      amountInput.focus();
      return;
    }
    renderQR(val);
  });

  amountInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('generateBtn').click();
  });

  document.getElementById('noAmountBtn').addEventListener('click', () => {
    amountInput.value = '';
    renderQR(null);
  });

  // initial render: prefill from ?amount= if present (e.g. linked from order.html in future), else amount-less QR
  if (initialAmount) {
    amountInput.value = initialAmount;
    renderQR(parseFloat(initialAmount));
  } else {
    renderQR(null);
  }
</script>

</body>
</html>
